<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Watch PH - Full Embedded Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <h2>🌦 Weather Watch PH</h2>

        <label>Advisory</label>
        <select id="advisory">
            <option>Class Suspension</option>
            <option>Rainfall Warning</option>
            <option>Flood Advisory</option>
            <option>Tropical Cyclone</option>
        </select>

        <label>Province</label>
        <select id="province">
            <option value="">All Provinces</option>
        </select>

        <label>Municipality / City</label>
        <select id="municipality">
            <option value="">Select Municipality</option>
        </select>

        <label>Status</label>
        <select id="status">
            <option>🔴 All Levels</option>
            <option>🟠 Senior High</option>
            <option>🟡 Elementary</option>
            <option>⚪ No Advisory</option>
        </select>

        <label>Color</label>
        <input type="color" id="colorPicker" value="#ff0000">

        <button id="applyBtn">Apply Color</button>
        <button id="resetBtn">Reset Colors</button>
        <button id="downloadBtn">Generate PNG</button>
        
        <div class="selected-box">
            Selected: <span id="selectedDisplay">None</span>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
