<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weather Watch PH Mapping System v3.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map"></div>

    <div class="floating-panel">
        <div class="panel-header">
            <i class="fa-solid fa-cloud-showers-water logo-icon"></i>
            <h2>Weather Watch PH</h2>
        </div>
        
        <div class="panel-body">
            <div class="control-group">
                <label>Advisory</label>
                <select id="advisory-type">
                    <option value="class-suspension">Class Suspension</option>
                    <option value="rainfall">Rainfall Warning</option>
                    <option value="flood">Flood Advisory</option>
                    <option value="cyclone">Tropical Cyclone</option>
                </select>
            </div>

            <div class="control-group">
                <label>Region</label>
                <select id="select-region">
                    <option value="">Select Region</option>
                    <option value="ncr">NCR (National Capital Region)</option>
                    <option value="r3">Region III (Central Luzon)</option>
                    <option value="r4a">Region IV-A (CALABARZON)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Province</label>
                <select id="select-province">
                    <option value="">Select Province</option>
                    <option value="bulacan">Bulacan</option>
                    <option value="cavite">Cavite</option>
                    <option value="rizal">Rizal</option>
                </select>
            </div>

            <div class="control-group">
                <label>Municipality</label>
                <select id="select-municipality">
                    <option value="">Select Municipality</option>
                </select>
            </div>

            <div class="control-group">
                <label>Status</label>
                <select id="select-status">
                    <option value="all-levels">🔴 All Levels</option>
                    <option value="kinder-high">🟠 Kindergarten to High School</option>
                    <option value="no-suspension">🟢 No Suspension</option>
                </select>
            </div>

            <div class="control-group">
                <label>Color</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="advisory-color" value="#ff3b30">
                </div>
            </div>

            <button id="btn-apply" class="btn btn-primary">Apply</button>
            <button id="btn-png" class="btn btn-secondary">Generate PNG</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="script.js"></script>
</body>
</html>
